<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameboy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">        
        <div class="gameboyBase">
            <div class="lineLeft"></div>
            <div class="lineRight"></div>
            <div class="internContent">
                <div class="twoColumnLinesTop">
                    <div class="lineColumn"></div>
                    <div class="lineColumnTwo"></div>
                </div>
                <div class="lineRowTop">
                    <div class="lineRow"></div>
                </div>
                <div class="displayCenter">
                    <div class="grayAreaDisplay">
                        <div class="twoLinesInside">
                            <div class="lineRowInside"></div>
                            <div class="lineRowInsideTwo"></div>
                        </div>
                        <div class="displayInside">
                            <div class="displayBlock">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="twoLinesCenter">
                    <div class="lineCenterRow"></div>
                    <div class="linesColumn">
                        <div class="lineCenterColumn"></div>
                        <div class="lineCenterColumn"></div>
                        <div class="lineCenterColumn"></div>
                        <div class="lineCenterColumn"></div>
                    </div>
                    <div class="lineCenterRowTwo"></div>
                </div>
                <div class="buttonsArea">
                    <div class="buttonLeft">
                        <div class="buttonAreaInside">
                            <div class="buttonInsideRow"></div>
                            <div class="buttonInsideRowBorder"></div>
                            <div class="buttonInsideColumn"></div>
                            <div class="buttonInsideColumnBorder"></div>
                        </div>
                    </div>
                    <div class="buttonRight">
                        <div class="buttonsInsideRight"></div>
                        <div class="buttonsInsideLeft"></div>
                    </div>
                </div>
                <div class="buttonsStartOff">
                    <div class="buttonsStarOffInside">
                        <div class="start"></div>
                        <div class="off"></div>
                    </div>
                    <div class="linesRotate">
                        <div class="linesRotateInsideOne"></div>
                        <div class="linesRotateInsideOne"></div>
                        <div class="linesRotateInsideOne"></div>
                        <div class="linesRotateInsideOne"></div>
                        <div class="linesRotateInsideOne"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="credits">
        Design:
        @AlbertWalicki
    </div>
    <script src="script.js"></script>
</body>
</html>
